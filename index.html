<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gnome Kingdom Idle</title>
    <style>
        body { margin: 0; background: #1a1c29; color: #fff; font-family: sans-serif; touch-action: manipulation; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 20px; text-align: center; background: rgba(0,0,0,0.3); z-index: 10; }
        .gold-display { font-size: 2em; font-weight: bold; color: #ffd700; text-shadow: 0 0 10px #ffd700; }
        .gpm-display { font-size: 0.9em; color: #aaa; margin-top: 5px; }
        
        /* Область игры */
        .kingdom-view { flex: 1; position: relative; overflow: hidden; border-bottom: 2px solid #333; display: flex; align-items: center; justify-content: center; }
        .ground { position: absolute; bottom: 0; width: 100%; height: 40%; background: linear-gradient(to top, #2d4a22, #1a1c29); z-index: 1; }
        
        /* Замок (кликабельный) */
        .castle-container { position: relative; z-index: 5; cursor: pointer; transition: transform 0.1s; user-select: none; -webkit-tap-highlight-color: transparent; }
        .castle-container:active { transform: scale(0.95); }
        
        .building { width: 60px; height: 80px; background: #555; border-radius: 10px 10px 0 0; box-shadow: inset -5px 0 0 rgba(0,0,0,0.3); transition: height 0.5s; margin: 0 auto; }
        .roof { width: 0; height: 0; border-left: 40px solid transparent; border-right: 40px solid transparent; border-bottom: 30px solid #8b4513; position: relative; top: -30px; left: -10px; }
        
        /* Гномы */
        .gnome { position: absolute; bottom: 35%; width: 20px; height: 30px; background: #ff6b6b; border-radius: 10px 10px 0 0; animation: work 0.5s infinite alternate; z-index: 2; }
        .gnome::after { content: ''; position: absolute; top: -10px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; }
        @keyframes work { from { transform: translateY(0); } to { transform: translateY(-5px); } }

        /* Магазин */
        .upgrade-menu { height: 40%; overflow-y: auto; padding: 15px; background: #111; }
        .upgrade-btn { width: 100%; padding: 15px; margin-bottom: 10px; background: #222; border: 1px solid #444; border-radius: 10px; color: #fff; text-align: left; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; box-sizing: border-box; }
        .upgrade-btn:active { transform: scale(0.98); background: #333; }
        .upgrade-btn.disabled { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
        
        .upg-info { display: flex; flex-direction: column; }
        .upg-name { font-weight: bold; font-size: 1.1em; }
        .upg-desc { font-size: 0.8em; color: #888; margin-top: 3px; }
        .upg-cost { color: #ffd700; font-weight: bold; }

        /* Всплывающий текст при клике */
        .float-text { position: absolute; color: #ffd700; font-weight: bold; pointer-events: none; animation: floatUp 1s forwards; z-index: 20; font-size: 1.5em; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="gold-display">💰 <span id="gold">0</span></div>
        <div class="gpm-display">Гномов: <span id="gnomes">0</span> | Доход: <span id="gps">0</span>/сек</div>
    </div>

    <div class="kingdom-view" id="click-area">
        <div class="ground"></div>
        
        <!-- Кликабельный замок -->
        <div class="castle-container" onclick="clickCastle(event)">
            <div class="building" id="castle">
                <div class="roof"></div>
            </div>
        </div>
        
        <div id="gnome-container"></div>
    </div>

    <div class="upgrade-menu" id="shop"></div>

    <script>
        // --- ДАННЫЕ ИГРЫ ---
        let game = {
            gold: 0,
            gnomes: 0,
            gps: 0,
            upgrades: [
                { id: 'hire', name: 'Нанять гнома', baseCost: 10, costMult: 1.15, count: 0, type: 'gnome' },
                { id: 'pick', name: 'Кирка +1', baseCost: 100, costMult: 1.2, count: 0, type: 'bonus' },
                { id: 'cart', name: 'Вагонетка x2', baseCost: 500, costMult: 1.3, count: 0, type: 'multi' }
            ]
        };

        // --- ЛОГИКА ---
        function calculateGPS() {
            let base = game.gnomes * 1;
            const pick = game.upgrades.find(u => u.id === 'pick');
            if(pick) base += pick.count * 1 * game.gnomes; // Кирка дает +1 к каждому гному
            
            const cart = game.upgrades.find(u => u.id === 'cart');
            if(cart) base *= Math.pow(2, cart.count); // Вагонетка удваивает
            
            game.gps = Math.floor(base);
        }

        function clickCastle(e) {
            // Даем 1 золото за клик + бонус от гномов (опционально)
            const earn = 1 + Math.floor(game.gnomes * 0.1); 
            game.gold += earn;
            
            // Эффект всплывающего текста
            const float = document.createElement('div');
            float.className = 'float-text';
            float.innerText = '+' + earn;
            float.style.left = e.clientX + 'px';
            float.style.top = e.clientY + 'px';
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 1000);
            
            updateUI();
        }

        function buyUpgrade(index) {
            const u = game.upgrades[index];
            const cost = Math.floor(u.baseCost * Math.pow(u.costMult, u.count));
            
            if (game.gold >= cost) {
                game.gold -= cost;
                u.count++;
                if(u.type === 'gnome') game.gnomes++;
                calculateGPS();
                renderShop(); // Перерисовываем магазин, чтобы обновить цены
                updateUI();
            }
        }

        // --- ОТРИСОВКА ---
        function updateUI() {
            document.getElementById('gold').innerText = Math.floor(game.gold).toLocaleString();
            document.getElementById('gnomes').innerText = game.gnomes;
            document.getElementById('gps').innerText = game.gps.toLocaleString();

            // Растем замок
            const h = 80 + (game.gnomes * 2);
            document.getElementById('castle').style.height = Math.min(h, 200) + 'px';

            // Гномы на экране
            const container = document.getElementById('gnome-container');
            const target = Math.min(game.gnomes, 30); // Макс 30 гномов визуально
            while(container.children.length < target) {
                const g = document.createElement('div');
                g.className = 'gnome';
                g.style.left = (10 + Math.random() * 80) + '%';
                g.style.animationDelay = (Math.random() * 0.5) + 's';
                container.appendChild(g);
            }
            while(container.children.length > target) container.removeChild(container.lastChild);

            // Обновляем состояние кнопок (активна/неактивна)
            game.upgrades.forEach((u, i) => {
                const btn = document.getElementById(`btn-${i}`);
                if(btn) {
                    const cost = Math.floor(u.baseCost * Math.pow(u.costMult, u.count));
                    if(game.gold < cost) btn.classList.add('disabled');
                    else btn.classList.remove('disabled');
                }
            });
        }

        function renderShop() {
            const shop = document.getElementById('shop');
            shop.innerHTML = '';
            game.upgrades.forEach((u, i) => {
                const cost = Math.floor(u.baseCost * Math.pow(u.costMult, u.count));
                const btn = document.createElement('div');
                btn.className = 'upgrade-btn';
                btn.id = `btn-${i}`;
                btn.onclick = () => buyUpgrade(i);
                
                let desc = '';
                if(u.id === 'hire') desc = '+1 гном (+1/сек)';
                if(u.id === 'pick') desc = '+1 золота за каждого гнома';
                if(u.id === 'cart') desc = 'Удваивает весь доход';

                btn.innerHTML = `
                    <div class="upg-info">
                        <div class="upg-name">${u.name} <span style="font-size:0.8em; color:#666;">(Ур.${u.count})</span></div>
                        <div class="upg-desc">${desc}</div>
                    </div>
                    <div class="upg-cost">${cost.toLocaleString()} 💰</div>
                `;
                shop.appendChild(btn);
            });
        }

        // --- ЦИКЛ ---
        setInterval(() => {
            if(game.gps > 0) {
                game.gold += game.gps / 10; // Плавное начисление
                updateUI();
            }
        }, 100);

        // Старт
        renderShop();
        updateUI();
    </script>
</body>
</html>
