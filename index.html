<!DOCTYPE html>
<html>
<body style="background:black; color:white; font-size:40px; text-align:center;">

<div id="score">0</div>
<button onclick="clickMe()" style="font-size:30px; padding:20px;">ЖМИ СЮДА</button>

<script>
let count = 0;

function clickMe() {
    count++;
    document.getElementById('score').innerText = count;
}
</script>

</body>
</html>
