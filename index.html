<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Idle v4.1 Pro</title>
    <style>
        :root { --bg: #2c3e50; --panel: #34495e; --accent: #f1c40f; --text: #ecf0f1; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; touch-action: manipulation; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        
        /* Кнопка меню */
        .menu-btn { position: absolute; top: 15px; left: 15px; z-index: 30; background: rgba(0,0,0,0.3); border: none; color: var(--text); width: 40px; height: 40px; border-radius: 8px; font-size: 1.5em; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .menu-btn:active { transform: scale(0.9); }

        /* Оверлей меню */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 40; opacity: 0; pointer-events: none; transition: 0.3s; backdrop-filter: blur(3px); }
        .overlay.active { opacity: 1; pointer-events: all; }

        /* Само меню */
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--panel); z-index: 50; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; box-sizing: border-box; overflow-y: auto; box-shadow: 5px 0 20px rgba(0,0,0,0.5); }
        .sidebar.active { left: 0; }
        
        .sidebar h2 { margin-top: 0; color: var(--accent); border-bottom: 2px solid #465c71; padding-bottom: 10px; }
        .menu-item { padding: 15px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .menu-item:hover, .menu-item.active { background: rgba(241, 196, 15, 0.1); color: var(--accent); }
        .menu-close { margin-top: 20px; background: #c0392b; text-align: center; color: white; }

        /* Игровая зона */
        .header { padding: 20px 10px; text-align: center; padding-left: 60px; /* Отступ под кнопку */ }
        .score { font-size: 2.5em; font-weight: bold; color: var(--accent); text-shadow: 0 2px 10px rgba(241, 196, 15, 0.3); }
        .stats-mini { font-size: 0.9em; color: #bdc3c7; margin-top: 5px; }

        .game-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .cat-container { width: 160px; height: 160px; cursor: pointer; transition: transform 0.1s; position: relative; }
        .cat-container:active { transform: scale(0.92); }
        
        .cat-body { width: 100%; height: 100%; border-radius: 50% 50% 45% 45%; position: relative; box-shadow: inset -10px -10px 0 rgba(0,0,0,0.1); transition: background 0.3s, box-shadow 0.3s; }
        .skin-white { background: #ecf0f1; }
        .skin-orange { background: #e67e22; }
        .skin-black { background: #2c3e50; border: 3px solid #7f8c8d; }
        .skin-cyber { background: #8e44ad; box-shadow: 0 0 20px #9b59b6; }
        .skin-cyber .eye { background: #00ff00 !important; box-shadow: 0 0 8px #00ff00; }

        .cat-ear { position: absolute; top: -20px; width: 0; height: 0; border-left: 25px solid transparent; border-right: 25px solid transparent; border-bottom: 50px solid inherit; }
        .ear-l { left: 10px; transform: rotate(-15deg); }
        .ear-r { right: 10px; transform: rotate(15deg); }
        .cat-body.skin-white .cat-ear { border-bottom-color: #ecf0f1; }
        .cat-body.skin-orange .cat-ear { border-bottom-color: #e67e22; }
        .cat-body.skin-black .cat-ear { border-bottom-color: #2c3e50; }
        .cat-body.skin-cyber .cat-ear { border-bottom-color: #8e44ad; }

        .face { position: absolute; top: 45%; left: 50%; transform: translateX(-50%); width: 60%; text-align: center; }
        .eyes { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .eye { width: 20px; height: 20px; background: #2c3e50; border-radius: 50%; position: relative; transition: 0.3s; }
        .eye::after { content:''; position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; background: #fff; border-radius: 50%; }
        .nose { width: 12px; height: 8px; background: #e74c3c; border-radius: 50%; margin: 0 auto; }

        /* Контент внутри меню */
        .tab-pane { display: none; animation: fadeIn 0.3s; }
        .tab-pane.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .upg-item { background: #2c3e50; padding: 12px; margin-bottom: 8px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #465c71; cursor: pointer; }
        .upg-item:active { transform: scale(0.98); }
        .upg-item.disabled { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
        .upg-info b { display: block; font-size: 1.1em; }
        .upg-info span { font-size: 0.8em; color: #95a5a6; }
        .upg-cost { color: var(--accent); font-weight: bold; text-align: right; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: #2c3e50; padding: 15px; border-radius: 10px; text-align: center; border: 2px solid transparent; cursor: pointer; }
        .card.selected { border-color: var(--accent); background: #3e5871; }
        .card.locked { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
        .card-icon { font-size: 2em; margin-bottom: 5px; }

        .ach-row { display: flex; align-items: center; padding: 10px; background: #2c3e50; margin-bottom: 5px; border-radius: 8px; }
        .ach-icon { font-size: 1.5em; margin-right: 10px; width: 30px; text-align: center; }
        .ach-info { flex: 1; }
        .ach-info b { display: block; font-size: 0.9em; }
        .ach-info span { font-size: 0.75em; color: #95a5a6; }

        .float-text { position: absolute; color: var(--accent); font-weight: bold; pointer-events: none; animation: floatUp 1s forwards; z-index: 20; font-size: 1.5em; }
        @keyframes floatUp { to { opacity: 0; transform: translateY(-60px); } }
        
        .toast { position: fixed; top: 20px; right: 20px; background: #2ecc71; color: #fff; padding: 10px 20px; border-radius: 20px; font-weight: bold; transform: translateX(200%); transition: 0.5s; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h2>Меню</h2>
        <div class="menu-item active" onclick="switchTab('shop', this)">🛒 Магазин (100+)</div>
        <div class="menu-item" onclick="switchTab('skins', this)"> Скины</div>
        <div class="menu-item" onclick="switchTab('ach', this)">🏆 Ачивки</div>
        <div class="menu-item" onclick="switchTab('settings', this)">⚙️ Настройки</div>
        <div class="menu-item menu-close" onclick="resetGame()"> Сброс</div>
        
        <!-- Панели контента -->
        <div id="pane-shop" class="tab-pane active" style="margin-top: 20px;"></div>
        <div id="pane-skins" class="tab-pane" style="margin-top: 20px;">
            <div class="grid" id="skins-grid"></div>
        </div>
        <div id="pane-ach" class="tab-pane" style="margin-top: 20px;" id="ach-list"></div>
        <div id="pane-settings" class="tab-pane" style="margin-top: 20px;">
            <div class="upg-item" onclick="toggleSound()">
                <div class="upg-info"><b> Звуки</b><span id="sound-status">Включены</span></div>
                <div class="upg-cost" id="sound-toggle">ON</div>
            </div>
            <p style="font-size:0.8em; color:#7f8c8d; margin-top:20px; text-align:center;">Cat Idle v4.1<br>By Roma</p>
        </div>
    </div>

    <div class="header">
        <div class="score">😻 <span id="purr">0</span></div>
        <div class="stats-mini">Мур/сек: <span id="mps">0</span> | Всего: <span id="total">0</span></div>
    </div>

    <div class="game-area" onclick="petCat(event)">
        <div class="cat-container">
            <div class="cat-body skin-white" id="cat-visual">
                <div class="cat-ear ear-l"></div>
                <div class="cat-ear ear-r"></div>
                <div class="face">
                    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                    <div class="nose"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // --- ДАННЫЕ ---
        const defaultState = {
            purr: 0, totalPurr: 0, clicks: 0, startTime: Date.now(), lastSave: Date.now(),
            soundOn: true, currentSkin: 'white', unlockedSkins: ['white'],
            upgrades: [], 
            achievements: [
                {id:'click1', name:'Первый тык', desc:'Кликни 1 раз', req:1, type:'clicks', got:false},
                {id:'purr100', name:'Мурчало', desc:'Накопи 100 мурчаний', req:100, type:'purr', got:false},
                {id:'rich', name:'Богач', desc:'Накопи 10k мурчаний', req:10000, type:'purr', got:false},
                {id:'master', name:'Мастер', desc:'Купи 50 улучшений', req:50, type:'count', got:false}
            ]
        };

        let game = JSON.parse(JSON.stringify(defaultState));
        
        // ГЕНЕРАТОР УЛУЧШЕНИЙ (ВСЕГДА ПЕРЕЗАПИСЫВАЕТ)
        function initUpgrades() {
            const names = ['Мышь','Молоко','Коробка','Лазер','Мята','Статуя','Подушка','Витамины','Щетка','Бант'];
            game.upgrades = []; // Очищаем массив
            for(let i=0; i<100; i++) {
                let tier = Math.floor(i / 10);
                let baseMps = Math.pow(2, tier) * (i%10 + 1);
                let baseCost = Math.pow(1.4, i) * 15;
                game.upgrades.push({
                    id: i, 
                    name: `${names[i%10]} ${tier+1}`, 
                    cost: Math.floor(baseCost), 
                    mps: Math.floor(baseMps), 
                    count: 0
                });
            }
        }

        // --- ЛОГИКА ---
        function getMPS() { return game.upgrades.reduce((a,u) => a + u.count * u.mps, 0); }
        
        function petCat(e) {
            if(!audioCtx && game.soundOn) initAudio();
            const earn = 1 + Math.floor(getMPS() * 0.05);
            game.purr += earn; game.totalPurr += earn; game.clicks++;
            
            playSound('click');
            showFloat(e.clientX, e.clientY, '+'+earn);
            checkAchievements();
            updateUI();
        }

        function buy(i) {
            const u = game.upgrades[i];
            if(game.purr >= u.cost) {
                game.purr -= u.cost;
                u.count++;
                u.cost = Math.floor(u.cost * 1.15);
                playSound('buy');
                renderShop(); 
                updateUI();
                saveGame();
            }
        }

        function checkAchievements() {
            let newUnlock = false;
            game.achievements.forEach(a => {
                if(a.got) return;
                let val = a.type==='clicks' ? game.clicks : (a.type==='purr' ? game.totalPurr : game.upgrades.reduce((s,u)=>s+u.count,0));
                if(val >= a.req) {
                    a.got = true;
                    showToast(` ${a.name}`);
                    playSound('ach');
                    newUnlock = true;
                    if(a.id==='purr100' && !game.unlockedSkins.includes('orange')) game.unlockedSkins.push('orange');
                    if(a.id==='rich' && !game.unlockedSkins.includes('black')) game.unlockedSkins.push('black');
                    if(a.id==='master' && !game.unlockedSkins.includes('cyber')) game.unlockedSkins.push('cyber');
                }
            });
            if(newUnlock) renderAch();
        }

        // --- UI & МЕНЮ ---
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // Обработка ESC
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape') {
                const sb = document.getElementById('sidebar');
                if(sb.classList.contains('active')) toggleMenu();
            }
        });

        function switchTab(name, btn) {
            document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));
            document.getElementById('pane-'+name).classList.add('active');
            if(btn) btn.classList.add('active');
            
            if(name==='shop') renderShop();
            if(name==='skins') renderSkins();
            if(name==='ach') renderAch();
        }

        function renderShop() {
            const c = document.getElementById('pane-shop');
            c.innerHTML = '';
            // Показываем только доступные или купленные + следующие 10
            let shown = 0;
            game.upgrades.forEach((u, i) => {
                if(shown > 30) return; 
                if(u.count > 0 || game.purr >= u.cost * 0.8 || shown < 5) {
                    const div = document.createElement('div');
                    div.className = 'upg-item ' + (game.purr < u.cost ? 'disabled' : '');
                    div.onclick = () => buy(i);
                    div.innerHTML = `<div class="upg-info"><b>${u.name}</b><span>+${u.mps} мур/сек | Ур.${u.count}</span></div>
                                     <div class="upg-cost">${u.cost.toLocaleString()} 😻</div>`;
                    c.appendChild(div);
                    shown++;
                }
            });
        }

        function renderSkins() {
            const g = document.getElementById('skins-grid');
            g.innerHTML = '';
            const skins = [
                {id:'white', name:'Снежок', icon:'⚪'},
                {id:'orange', name:'Рыжик', icon:''},
                {id:'black', name:'Багира', icon:'⚫'},
                {id:'cyber', name:'Кибер', icon:'🟣'}
            ];
            skins.forEach(s => {
                const locked = !game.unlockedSkins.includes(s.id);
                const div = document.createElement('div');
                div.className = 'card ' + (game.currentSkin===s.id ? 'selected' : '') + (locked ? ' locked' : '');
                div.innerHTML = `<div class="card-icon">${s.icon}</div><div>${s.name}</div>${locked?'<div style="font-size:0.7em">🔒</div>':''}`;
                if(!locked) div.onclick = () => { game.currentSkin = s.id; applySkin(); renderSkins(); saveGame(); };
                g.appendChild(div);
            });
        }

        function renderAch() {
            const l = document.getElementById('pane-ach');
            l.innerHTML = '';
            game.achievements.forEach(a => {
                const div = document.createElement('div');
                div.className = 'ach-row';
                div.style.opacity = a.got ? '1' : '0.5';
                div.innerHTML = `<div class="ach-icon">${a.got?'✅':'🔒'}</div>
                                 <div class="ach-info"><b>${a.name}</b><span>${a.desc}</span></div>`;
                l.appendChild(div);
            });
        }

        function applySkin() {
            document.getElementById('cat-visual').className = 'cat-body skin-' + game.currentSkin;
        }

        function updateUI() {
            document.getElementById('purr').innerText = Math.floor(game.purr).toLocaleString();
            document.getElementById('mps').innerText = getMPS().toLocaleString();
            document.getElementById('total').innerText = Math.floor(game.totalPurr).toLocaleString();
        }

        function showFloat(x, y, text) {
            const el = document.createElement('div');
            el.className = 'float-text'; el.innerText = text;
            el.style.left = x+'px'; el.style.top = y+'px';
            document.body.appendChild(el);
            setTimeout(()=>el.remove(), 1000);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(()=>t.classList.remove('show'), 3000);
        }

        // --- ЗВУКИ ---
        let audioCtx;
        function initAudio() { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(type) {
            if(!game.soundOn || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type==='click') { osc.frequency.value=600; gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1); osc.start(); osc.stop(audioCtx.currentTime+0.1); }
            if(type==='buy') { osc.frequency.value=400; osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime+0.1); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.2); osc.start(); osc.stop(audioCtx.currentTime+0.2); }
            if(type==='ach') { osc.type='triangle'; osc.frequency.value=500; osc.frequency.linearRampToValueAtTime(1000, audioCtx.currentTime+0.3); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.5); osc.start(); osc.stop(audioCtx.currentTime+0.5); }
        }

        function toggleSound() {
            game.soundOn = !game.soundOn;
            document.getElementById('sound-toggle').innerText = game.soundOn ? 'ON' : 'OFF';
            document.getElementById('sound-status').innerText = game.soundOn ? 'Включены' : 'Выключены';
            if(game.soundOn && !audioCtx) initAudio();
        }

        // --- СИСТЕМА ---
        function saveGame() { game.lastSave = Date.now(); localStorage.setItem('catPro_v4_1', JSON.stringify(game)); }
        function loadGame() { 
            const s = localStorage.getItem('catPro_v4_1'); 
            if(s) { try { const saved = JSON.parse(s); game = {...defaultState, ...saved}; } catch(e){} }
            initUpgrades(); // ВСЕГДА ГЕНЕРИРУЕМ ЗАНОВО
            applySkin(); 
            const secs = (Date.now() - game.lastSave)/1000;
            if(secs > 60) {
                const earned = Math.floor(secs * getMPS() * 0.5);
                if(earned > 0) { game.purr += earned; game.totalPurr += earned; setTimeout(()=>alert(`Офлайн доход: +${earned} мурчаний!`), 500); }
            }
        }
        function resetGame() { if(confirm('Удалить всё?')) { localStorage.removeItem('catPro_v4_1'); location.reload(); } }

        setInterval(() => { 
            const mps = getMPS(); 
            if(mps>0) { game.purr += mps/10; game.totalPurr += mps/10; updateUI(); } 
        }, 100);
        setInterval(saveGame, 10000);

        // Старт
        loadGame(); renderShop(); updateUI();
    </script>
</body>
</html>
