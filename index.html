<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#1a1c29; color:white; font-family:sans-serif; text-align:center; padding-top:50px;">

    <h1 style="color:#ffd700; font-size:40px;">💰 <span id="gold">0</span></h1>
    <p>Гномов: <span id="gnomes">0</span> | Доход: <span id="gps">0</span>/сек</p>

    <button onclick="buy()" style="background:#2ecc71; border:none; color:white; padding:20px 40px; font-size:20px; border-radius:10px; margin-top:20px;">
        Нанять гнома (<span id="cost">10</span>💰)
    </button>

    <div id="army" style="margin-top:50px; font-size:30px;"></div>

    <script>
        let gold = 0;
        let gnomes = 0;
        let cost = 10;

        function buy() {
            if (gold >= cost) {
                gold -= cost;
                gnomes++;
                cost = Math.floor(cost * 1.15);
                update();
            }
        }

        setInterval(function() {
            gold += gnomes;
            update();
        }, 1000);

        function update() {
            document.getElementById('gold').innerText = gold;
            document.getElementById('gnomes').innerText = gnomes;
            document.getElementById('gps').innerText = gnomes;
            document.getElementById('cost').innerText = cost;
            
            let armyText = "";
            for(let i=0; i<gnomes; i++) armyText += "👷‍♂️";
            document.getElementById('army').innerText = armyText;
        }
    </script>

</body>
</html>
