<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Petting Idle v2.0</title>
    <style>
        body { margin: 0; background: #2c3e50; color: #fff; font-family: sans-serif; touch-action: manipulation; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { padding: 15px; text-align: center; background: rgba(0,0,0,0.3); z-index: 10; border-bottom: 1px solid #34495e; }
        .score-display { font-size: 2em; font-weight: bold; color: #f1c40f; }
        .sub-stats { font-size: 0.85em; color: #bdc3c7; margin-top: 5px; }

        .game-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Кот */
        .cat-container { 
            position: relative; width: 130px; height: 130px; cursor: pointer; 
            transition: transform 0.1s; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .cat-container:active { transform: scale(0.9) rotate(-3deg); }
        .cat-body { width: 100%; height: 100%; background: #ecf0f1; border-radius: 50% 50% 45% 45%; position: relative; box-shadow: inset -8px -8px 0 rgba(0,0,0,0.1); }
        .cat-ear { position: absolute; top: -18px; width: 0; height: 0; border-left: 22px solid transparent; border-right: 22px solid transparent; border-bottom: 45px solid #ecf0f1; }
        .ear-l { left: 8px; transform: rotate(-15deg); }
        .ear-r { right: 8px; transform: rotate(15deg); }
        .cat-face { position: absolute; top: 42%; left: 50%; transform: translateX(-50%); width: 55%; text-align: center; }
        .eyes { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .eye { width: 18px; height: 18px; background: #2c3e50; border-radius: 50%; position: relative; }
        .eye::after { content:''; position: absolute; top: 3px; right: 3px; width: 5px; height: 5px; background: #fff; border-radius: 50%; }
        .nose { width: 10px; height: 7px; background: #e74c3c; border-radius: 50%; margin: 0 auto; }

        /* Эффекты */
        .float-heart { position: absolute; color: #e74c3c; font-size: 22px; pointer-events: none; animation: floatUp 0.8s forwards; z-index: 20; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.3); } }

        /* Магазин и Статы */
        .bottom-panel { height: 45%; background: #34495e; display: flex; flex-direction: column; border-top: 3px solid #2c3e50; }
        
        .tabs { display: flex; background: #2c3e50; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: bold; color: #7f8c8d; border-bottom: 3px solid transparent; transition: 0.2s; }
        .tab.active { color: #f1c40f; border-bottom-color: #f1c40f; background: #34495e; }
        
        .content-area { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .content-area.active { display: block; }

        /* Улучшения */
        .upgrade-btn { 
            background: #2c3e50; border: 1px solid #465c71; border-radius: 10px; 
            padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; 
            cursor: pointer; transition: 0.1s; color: #fff;
        }
        .upgrade-btn:active { transform: scale(0.98); background: #3e5871; }
        .upgrade-btn.disabled { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        .upgrade-btn.clicked { pointer-events: none; opacity: 0.7; }
        
        .upg-name { font-weight: bold; font-size: 1em; }
        .upg-desc { font-size: 0.75em; color: #95a5a6; margin-top: 3px; }
        .upg-cost { color: #f1c40f; font-weight: bold; }

        /* Статистика */
        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #465c71; font-size: 0.95em; }
        .stat-label { color: #bdc3c7; }
        .stat-value { color: #f1c40f; font-weight: bold; }
        
        .reset-btn { 
            margin-top: 20px; width: 100%; padding: 12px; background: #c0392b; 
            border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; 
        }
        .save-indicator { position: fixed; top: 10px; right: 10px; font-size: 0.7em; color: #2ecc71; opacity: 0; transition: 0.5s; }
        .save-indicator.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="header">
        <div class="score-display">😻 <span id="purr">0</span></div>
        <div class="sub-stats">Мур/сек: <span id="mps">0</span> | Лапок: <span id="paws">0</span></div>
    </div>

    <div class="game-area">
        <div class="cat-container" onclick="petCat(event)">
            <div class="cat-body">
                <div class="cat-ear ear-l"></div>
                <div class="cat-ear ear-r"></div>
                <div class="cat-face">
                    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                    <div class="nose"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-panel">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('shop')">🛒 Магазин</div>
            <div class="tab" onclick="switchTab('stats')">📊 Статистика</div>
        </div>
        
        <div id="tab-shop" class="content-area active"></div>
        <div id="tab-stats" class="content-area">
            <div class="stat-row"><span class="stat-label">Всего поглаживаний:</span><span class="stat-value" id="stat-clicks">0</span></div>
            <div class="stat-row"><span class="stat-label">Всего мурчаний:</span><span class="stat-value" id="stat-total">0</span></div>
            <div class="stat-row"><span class="stat-label">Время в игре:</span><span class="stat-value" id="stat-time">0 сек</span></div>
            <div class="stat-row"><span class="stat-label">Макс. доход/сек:</span><span class="stat-value" id="stat-max-mps">0</span></div>
            <button class="reset-btn" onclick="resetGame()">️ Сбросить прогресс</button>
        </div>
    </div>

    <div class="save-indicator" id="save-msg">💾 Сохранено!</div>

    <script>
        // --- ДАННЫЕ ИГРЫ ---
        const defaultState = {
            purr: 0, totalPurr: 0, clicks: 0, startTime: Date.now(), maxMps: 0,
            upgrades: [
                { id: 'toy', name: 'Игрушечная мышь', baseCost: 15, mult: 1.15, count: 0, mps: 1 },
                { id: 'milk', name: 'Миска молока', baseCost: 100, mult: 1.2, count: 0, mps: 5 },
                { id: 'box', name: 'Картонная коробка', baseCost: 500, mult: 1.25, count: 0, mps: 20 },
                { id: 'laser', name: 'Лазерная указка', baseCost: 2000, mult: 1.3, count: 0, mps: 50 },
                { id: 'catnip', name: 'Кошачья мята', baseCost: 10000, mult: 1.35, count: 0, mps: 200 },
                { id: 'statue', name: 'Золотая статуя', baseCost: 100000, mult: 1.4, count: 0, mps: 1000 }
            ]
        };

        let game = JSON.parse(JSON.stringify(defaultState));

        // --- СИСТЕМА СОХРАНЕНИЙ ---
        function saveGame() {
            localStorage.setItem('catIdleSave_v2', JSON.stringify(game));
            const msg = document.getElementById('save-msg');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 1500);
        }

        function loadGame() {
            const saved = localStorage.getItem('catIdleSave_v2');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // Объединяем с дефолтом на случай добавления новых апгрейдов в будущем
                    game = { ...defaultState, ...parsed, upgrades: defaultState.upgrades.map((u, i) => ({...u, ...(parsed.upgrades[i] || {})})) };
                } catch(e) { console.error("Ошибка загрузки", e); }
            }
        }

        function resetGame() {
            if(confirm("Точно сбросить весь прогресс? Это нельзя отменить!")) {
                game = JSON.parse(JSON.stringify(defaultState));
                saveGame();
                renderShop(); updateUI();
            }
        }

        // --- ЛОГИКА ---
        function calculateMPS() {
            let total = 0;
            game.upgrades.forEach(u => total += u.count * u.mps);
            game.maxMps = Math.max(game.maxMps, total);
            return total;
        }

        function petCat(e) {
            game.clicks++;
            const earn = 1 + Math.floor(game.upgrades.reduce((a,b)=>a+b.count,0) * 0.5);
            game.purr += earn;
            game.totalPurr += earn;
            
            const heart = document.createElement('div');
            heart.className = 'float-heart';
            heart.innerText = ['❤️','😻','🐾','✨'][Math.floor(Math.random()*4)];
            heart.style.left = (e.clientX - 10 + (Math.random()*20-10)) + 'px';
            heart.style.top = (e.clientY - 20) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 800);
            
            updateUI();
        }

        function buyUpgrade(index) {
            const u = game.upgrades[index];
            const cost = Math.floor(u.baseCost * Math.pow(u.mult, u.count));
            
            const btn = document.getElementById(`btn-${index}`);
            if(btn && btn.classList.contains('clicked')) return;
            if(btn) { btn.classList.add('clicked'); setTimeout(() => btn.classList.remove('clicked'), 150); }

            if (game.purr >= cost) {
                game.purr -= cost;
                u.count++;
                calculateMPS();
                renderShop(); updateUI();
                saveGame(); // Сохраняем при каждой покупке
            }
        }

        // --- ИНТЕРФЕЙС ---
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
            
            if(tabName === 'shop') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('tab-shop').classList.add('active');
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('tab-stats').classList.add('active');
                updateStats();
            }
        }

        function updateStats() {
            document.getElementById('stat-clicks').innerText = game.clicks.toLocaleString();
            document.getElementById('stat-total').innerText = Math.floor(game.totalPurr).toLocaleString();
            document.getElementById('stat-time').innerText = Math.floor((Date.now() - game.startTime)/1000) + ' сек';
            document.getElementById('stat-max-mps').innerText = game.maxMps.toLocaleString();
        }

        function updateUI() {
            const mps = calculateMPS();
            document.getElementById('purr').innerText = Math.floor(game.purr).toLocaleString();
            document.getElementById('mps').innerText = mps.toLocaleString();
            document.getElementById('paws').innerText = game.upgrades.reduce((a,b)=>a+b.count,0);

            game.upgrades.forEach((u, i) => {
                const btn = document.getElementById(`btn-${i}`);
                if(btn) {
                    const cost = Math.floor(u.baseCost * Math.pow(u.mult, u.count));
                    btn.classList.toggle('disabled', game.purr < cost);
                }
            });
        }

        function renderShop() {
            const shop = document.getElementById('tab-shop');
            shop.innerHTML = '';
            game.upgrades.forEach((u, i) => {
                const cost = Math.floor(u.baseCost * Math.pow(u.mult, u.count));
                const btn = document.createElement('div');
                btn.className = 'upgrade-btn';
                btn.id = `btn-${i}`;
                btn.onclick = () => buyUpgrade(i);
                btn.innerHTML = `
                    <div>
                        <div class="upg-name">${u.name} <span style="font-size:0.8em; color:#7f8c8d;">(Ур.${u.count})</span></div>
                        <div class="upg-desc">+${u.mps} мур/сек</div>
                    </div>
                    <div class="upg-cost">${cost.toLocaleString()} </div>
                `;
                shop.appendChild(btn);
            });
        }

        // --- ЦИКЛ ---
        setInterval(() => {
            const mps = calculateMPS();
            if(mps > 0) {
                const add = mps / 10;
                game.purr += add;
                game.totalPurr += add;
                updateUI();
            }
        }, 100);

        setInterval(saveGame, 5000); // Автосохранение каждые 5 сек

        // Старт
        loadGame();
        renderShop();
        updateUI();
    </script>
</body>
</html>
