<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Petting Idle</title>
    <style>
        body { margin: 0; background: #2c3e50; color: #fff; font-family: sans-serif; touch-action: manipulation; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Верхняя панель */
        .header { padding: 20px; text-align: center; background: rgba(0,0,0,0.2); z-index: 10; }
        .score-display { font-size: 2.5em; font-weight: bold; color: #f1c40f; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .stats { font-size: 0.9em; color: #bdc3c7; margin-top: 5px; }

        /* Игровая зона */
        .game-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Кот (рисуем CSS) */
        .cat-container { 
            position: relative; width: 150px; height: 150px; cursor: pointer; 
            transition: transform 0.1s; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .cat-container:active { transform: scale(0.9) rotate(-5deg); }
        
        .cat-body { 
            width: 100%; height: 100%; background: #ecf0f1; border-radius: 50% 50% 40% 40%; 
            position: relative; box-shadow: inset -10px -10px 0 rgba(0,0,0,0.1);
        }
        .cat-ear { 
            position: absolute; top: -20px; width: 0; height: 0; 
            border-left: 25px solid transparent; border-right: 25px solid transparent; border-bottom: 50px solid #ecf0f1; 
        }
        .ear-l { left: 10px; transform: rotate(-15deg); }
        .ear-r { right: 10px; transform: rotate(15deg); }
        
        .cat-face { position: absolute; top: 40%; left: 50%; transform: translateX(-50%); width: 60%; text-align: center; }
        .eyes { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .eye { width: 20px; height: 20px; background: #2c3e50; border-radius: 50%; position: relative; }
        .eye::after { content:''; position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; background: #fff; border-radius: 50%; }
        .nose { width: 12px; height: 8px; background: #e74c3c; border-radius: 50%; margin: 0 auto; }
        
        /* Анимация мурчания */
        .purr-wave { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 100%; height: 100%; border: 3px solid #f1c40f; border-radius: 50%; 
            opacity: 0; pointer-events: none; 
        }
        .cat-container:active .purr-wave { animation: purrAnim 0.4s ease-out; }
        @keyframes purrAnim { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }

        /* Всплывающие сердечки */
        .float-heart { position: absolute; color: #e74c3c; font-size: 24px; pointer-events: none; animation: floatUp 1s forwards; z-index: 20; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-60px) scale(1.2); } }

        /* Магазин */
        .shop { height: 40%; background: #34495e; padding: 15px; overflow-y: auto; border-top: 4px solid #2c3e50; }
        .upgrade-btn { 
            background: #2c3e50; border: 1px solid #465c71; border-radius: 12px; 
            padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; 
            cursor: pointer; transition: 0.2s; color: #fff;
        }
        .upgrade-btn:active { transform: scale(0.98); background: #3e5871; }
        .upgrade-btn.disabled { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        .upgrade-btn.clicked { pointer-events: none; opacity: 0.7; } /* Защита от спама */
        
        .upg-name { font-weight: bold; font-size: 1.1em; }
        .upg-desc { font-size: 0.8em; color: #95a5a6; margin-top: 4px; }
        .upg-cost { color: #f1c40f; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

    <div class="header">
        <div class="score-display">😻 <span id="purr">0</span></div>
        <div class="stats">Мурчаний/сек: <span id="mps">0</span> | Лапок: <span id="paws">0</span></div>
    </div>

    <div class="game-area">
        <div class="cat-container" onclick="petCat(event)">
            <div class="purr-wave"></div>
            <div class="cat-body">
                <div class="cat-ear ear-l"></div>
                <div class="cat-ear ear-r"></div>
                <div class="cat-face">
                    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                    <div class="nose"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="shop" id="shop"></div>

    <script>
        // --- ДАННЫЕ ИГРЫ ---
        let game = {
            purr: 0,
            mps: 0, // Murrs Per Second
            paws: 0, // Количество "лапок" (улучшений)
            upgrades: [
                { id: 'toy', name: 'Игрушечная мышь', baseCost: 15, costMult: 1.15, count: 0, mps: 1 },
                { id: 'milk', name: 'Миска молока', baseCost: 100, costMult: 1.2, count: 0, mps: 5 },
                { id: 'box', name: 'Картонная коробка', baseCost: 500, costMult: 1.25, count: 0, mps: 20 },
                { id: 'laser', name: 'Лазерная указка', baseCost: 2000, costMult: 1.3, count: 0, mps: 50 }
            ]
        };

        // --- ЛОГИКА ---
        function calculateMPS() {
            let total = 0;
            game.upgrades.forEach(u => {
                total += u.count * u.mps;
            });
            game.mps = total;
        }

        function petCat(e) {
            // Защита от спама: даем бонус только если кликнули не слишком часто
            const earn = 1 + Math.floor(game.paws * 0.5); 
            game.purr += earn;
            
            // Эффект сердечка
            const heart = document.createElement('div');
            heart.className = 'float-heart';
            heart.innerText = '❤️';
            heart.style.left = (e.clientX - 10) + 'px';
            heart.style.top = (e.clientY - 20) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
            
            updateUI();
        }

        function buyUpgrade(index) {
            const u = game.upgrades[index];
            const cost = Math.floor(u.baseCost * Math.pow(u.costMult, u.count));
            
            // ЗАЩИТА ОТ СПАМА КЛИКОВ
            const btn = document.getElementById(`btn-${index}`);
            if(btn && btn.classList.contains('clicked')) return;
            if(btn) {
                btn.classList.add('clicked');
                setTimeout(() => btn.classList.remove('clicked'), 150);
            }

            if (game.purr >= cost) {
                game.purr -= cost;
                u.count++;
                game.paws++; // Считаем общее кол-во улучшений
                calculateMPS();
                renderShop(); // Перерисовываем цены
                updateUI();
            }
        }

        // --- ОТРИСОВКА ---
        function updateUI() {
            document.getElementById('purr').innerText = Math.floor(game.purr).toLocaleString();
            document.getElementById('mps').innerText = game.mps.toLocaleString();
            document.getElementById('paws').innerText = game.paws;

            // Обновляем доступность кнопок
            game.upgrades.forEach((u, i) => {
                const btn = document.getElementById(`btn-${i}`);
                if(btn) {
                    const cost = Math.floor(u.baseCost * Math.pow(u.costMult, u.count));
                    if(game.purr < cost) btn.classList.add('disabled');
                    else btn.classList.remove('disabled');
                }
            });
        }

        function renderShop() {
            const shop = document.getElementById('shop');
            shop.innerHTML = '';
            game.upgrades.forEach((u, i) => {
                const cost = Math.floor(u.baseCost * Math.pow(u.costMult, u.count));
                const btn = document.createElement('div');
                btn.className = 'upgrade-btn';
                btn.id = `btn-${i}`;
                btn.onclick = () => buyUpgrade(i);
                
                btn.innerHTML = `
                    <div>
                        <div class="upg-name">${u.name} <span style="font-size:0.8em; color:#7f8c8d;">(Ур.${u.count})</span></div>
                        <div class="upg-desc">+${u.mps} мур/сек</div>
                    </div>
                    <div class="upg-cost">${cost.toLocaleString()} 😻</div>
                `;
                shop.appendChild(btn);
            });
        }

        // --- ИГРОВОЙ ЦИКЛ ---
        setInterval(() => {
            if(game.mps > 0) {
                game.purr += game.mps / 10; // Плавное начисление
                updateUI();
            }
        }, 100);

        // Старт
        renderShop();
        updateUI();
    </script>
</body>
</html>
