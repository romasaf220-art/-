<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gnome Kingdom Idle</title>
    <style>
        body { 
            margin: 0; background: #1a1c29; color: #fff; 
            font-family: 'Segoe UI', sans-serif; touch-action: manipulation;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        
        /* Верхняя панель */
        .header { padding: 20px; text-align: center; background: rgba(0,0,0,0.3); }
        .gold-display { font-size: 2em; font-weight: bold; color: #ffd700; text-shadow: 0 0 10px #ffd700; }
        .gpm-display { font-size: 0.9em; color: #aaa; margin-top: 5px; }

        /* Визуализация королевства */
        .kingdom-view { flex: 1; position: relative; overflow: hidden; border-bottom: 2px solid #333; }
        .ground { 
            position: absolute; bottom: 0; width: 100%; height: 40%; 
            background: linear-gradient(to top, #2d4a22, #1a1c29);
        }
        
        /* Гномы и здания (рисуем кодом) */
        .building { 
            position: absolute; bottom: 30%; left: 50%; transform: translateX(-50%);
            width: 60px; height: 80px; background: #555; border-radius: 10px 10px 0 0;
            box-shadow: inset -5px 0 0 rgba(0,0,0,0.3); transition: height 0.5s;
        }
        .roof { 
            position: absolute; top: -30px; left: -10px; 
            border-left: 40px solid transparent; border-right: 40px solid transparent; 
            border-bottom: 30px solid #8b4513; 
        }
        
        .gnome {
            position: absolute; bottom: 35%; width: 20px; height: 30px;
            background: #ff6b6b; border-radius: 10px 10px 0 0;
            animation: work 0.5s infinite alternate;
        }
        .gnome::after {
            content: ''; position: absolute; top: -10px; left: 2px;
            width: 16px; height: 16px; background: #fff; border-radius: 50%;
        }
        @keyframes work { from { transform: translateY(0); } to { transform: translateY(-5px); } }

        /* Меню улучшений */
        .upgrade-menu { height: 40%; overflow-y: auto; padding: 15px; background: #111; }
        .upgrade-btn {
            width: 100%; padding: 15px; margin-bottom: 10px; 
            background: #222; border: 1px solid #444; border-radius: 10px;
            color: #fff; text-align: left; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .upgrade-btn:active { transform: scale(0.98); background: #333; }
        .upgrade-btn.disabled { opacity: 0.5; pointer-events: none; }
        
        .upg-name { font-weight: bold; font-size: 1.1em; }
        .upg-cost { color: #ffd700; font-size: 0.9em; }
        .upg-desc { font-size: 0.8em; color: #888; margin-top: 3px; }

        /* Модальное окно офлайн дохода */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal.active { opacity: 1; pointer-events: all; }
        .modal-content { 
            background: #222; padding: 30px; border-radius: 20px; text-align: center; 
            border: 2px solid #ffd700; max-width: 80%;
        }
        .modal h2 { color: #ffd700; margin-top: 0; }
        .modal p { font-size: 1.2em; margin: 20px 0; }
        .modal button {
            background: #ffd700; color: #000; border: none; padding: 15px 40px;
            font-size: 1.2em; font-weight: bold; border-radius: 50px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="gold-display">💰 <span id="gold">0</span></div>
        <div class="gpm-display">Гномов: <span id="gnomes">0</span> | Доход: <span id="gps">0</span>/сек</div>
    </div>

    <div class="kingdom-view">
        <div class="ground"></div>
        <div class="building" id="castle">
            <div class="roof"></div>
        </div>
        <!-- Гномы будут добавляться сюда JS -->
        <div id="gnome-container"></div>
    </div>

    <div class="upgrade-menu" id="shop">
        <!-- Кнопки генерируются JS -->
    </div>

    <!-- Окно офлайн дохода -->
    <div class="modal" id="offline-modal">
        <div class="modal-content">
            <h2>Пока тебя не было...</h2>
            <p>Твои гномы заработали:<br><span style="color:#ffd700; font-size:1.5em;">+<span id="offline-gold">0</span> 💰</span></p>
            <button onclick="closeModal()">ЗАБРАТЬ</button>
        </div>
    </div>

    <script>
        // --- СОСТОЯНИЕ ИГРЫ ---
        let game = {
            gold: 0,
            gnomes: 0,
            gps: 0, // Gold Per Second
            lastSaveTime: Date.now(),
            upgrades: [
                { id: 'hire', name: 'Нанять гнома', baseCost: 10, costMult: 1.15, count: 0, gps: 1 },
                { id: 'pickaxe', name: 'Кирка +1', baseCost: 100, costMult: 1.2, count: 0, gps: 0, bonusPerGnome: 1 },
                { id: 'cart', name: 'Вагонетка x2', baseCost: 500, costMult: 1.3, count: 0, gps: 0, multiplier: 2 }
            ]
        };

        // --- ЗАГРУЗКА / ОФЛАЙН ЛОГИКА ---
        function loadGame() {
            const saved = localStorage.getItem('gnomeKingdomSave');
            if (saved) {
                const parsed = JSON.parse(saved);
                // Восстанавливаем значения
                game.gold = parsed.gold || 0;
                game.gnomes = parsed.gnomes || 0;
                game.lastSaveTime = parsed.lastSaveTime || Date.now();
                
                // Восстанавливаем апгрейды
                parsed.upgrades.forEach((u, i) => {
                    if(game.upgrades[i]) game.upgrades[i].count = u.count;
                });

                // Считаем офлайн доход
                const now = Date.now();
                const secondsOffline = (now - game.lastSaveTime) / 1000;
                calculateGPS(); // Пересчитываем текущий GPS
                const offlineEarned = Math.floor(secondsOffline * game.gps);
                
                if (offlineEarned > 0) {
                    game.gold += offlineEarned;
                    document.getElementById('offline-gold').innerText = offlineEarned.toLocaleString();
                    document.getElementById('offline-modal').classList.add('active');
                }
            }
            renderShop();
            updateUI();
        }

        function saveGame() {
            game.lastSaveTime = Date.now();
            localStorage.setItem('gnomeKingdomSave', JSON.stringify(game));
        }

        function closeModal() {
            document.getElementById('offline-modal').classList.remove('active');
        }

        // --- МАТЕМАТИКА ---
        function getCost(upgrade) {
            return Math.floor(upgrade.baseCost * Math.pow(upgrade.costMult, upgrade.count));
        }

        function calculateGPS() {
            let base = game.gnomes * 1; // Базовый доход гнома
            
            // Применяем бонусы от кирок
            const pickaxe = game.upgrades.find(u => u.id === 'pickaxe');
            if(pickaxe && pickaxe.count > 0) base += pickaxe.count * pickaxe.bonusPerGnome;

            // Применяем множители вагонеток
            const cart = game.upgrades.find(u => u.id === 'cart');
            if(cart && cart.count > 0) base *= Math.pow(cart.multiplier, cart.count);

            game.gps = Math.floor(base);
        }

        // --- ДЕЙСТВИЯ ---
        function buyUpgrade(index) {
            const upg = game.upgrades[index];
            const cost = getCost(upg);
            
            if (game.gold >= cost) {
                game.gold -= cost;
                upg.count++;
                
                if (upg.id === 'hire') game.gnomes++;
                
                calculateGPS();
                renderShop();
                updateUI();
                saveGame();
            }
        }

        // --- ОТРИСОВКА ---
        function updateUI() {
            document.getElementById('gold').innerText = Math.floor(game.gold).toLocaleString();
            document.getElementById('gnomes').innerText = game.gnomes;
            document.getElementById('gps').innerText = game.gps;

            // Растем замок визуально
            const castleHeight = 80 + (game.gnomes * 2);
            document.getElementById('castle').style.height = Math.min(castleHeight, 250) + 'px';

            // Добавляем/удаляем гномов на экране (максимум 20 для производительности)
            const container = document.getElementById('gnome-container');
            const currentGnomesDOM = container.children.length;
            const targetGnomes = Math.min(game.gnomes, 20);

            if (currentGnomesDOM < targetGnomes) {
                for(let i=currentGnomesDOM; i<targetGnomes; i++) {
                    const g = document.createElement('div');
                    g.className = 'gnome';
                    g.style.left = (20 + Math.random() * 60) + '%';
                    g.style.animationDelay = (Math.random() * 0.5) + 's';
                    container.appendChild(g);
                }
            } else if (currentGnomesDOM > targetGnomes) {
                while(container.children.length > targetGnomes) container.removeChild(container.lastChild);
            }

            // Обновляем доступность кнопок
            game.upgrades.forEach((u, i) => {
                const btn = document.getElementById(`btn-${i}`);
                if(btn) {
                    const cost = getCost(u);
                    btn.classList.toggle('disabled', game.gold < cost);
                    document.getElementById(`cost-${i}`).innerText = cost.toLocaleString() + ' 💰';
                    document.getElementById(`cnt-${i}`).innerText = u.count;
                }
            });
        }

        function renderShop() {
            const shop = document.getElementById('shop');
            shop.innerHTML = '';
            game.upgrades.forEach((u, i) => {
                const btn = document.createElement('div');
                btn.className = 'upgrade-btn';
                btn.id = `btn-${i}`;
                btn.onclick = () => buyUpgrade(i);
                btn.innerHTML = `
                    <div>
                        <div class="upg-name">${u.name} <span style="font-size:0.8em; color:#666;">(Ур.<span id="cnt-${i}">${u.count}</span>)</span></div>
                        <div class="upg-desc">${getUpgradeDesc(u)}</div>
                    </div>
                    <div class="upg-cost" id="cost-${i}">${getCost(u)} 💰</div>
                `;
                shop.appendChild(btn);
            });
        }

        function getUpgradeDesc(u) {
            if(u.id === 'hire') return '+1 гном (+1/сек)';
            if(u.id === 'pickaxe') return `+${u.bonusPerGnome} золота за каждого гнома`;
            if(u.id === 'cart') return `Удваивает весь доход (x${Math.pow(2, u.count)})`;
            return '';
        }

        // --- ИГРОВОЙ ЦИКЛ ---
        setInterval(() => {
            if(game.gps > 0) {
                game.gold += game.gps / 10; // Обновляем 10 раз в секунду для плавности
                updateUI();
            }
        }, 100);

        // Автосохранение каждые 10 сек
        setInterval(saveGame, 10000);

        // Старт
        loadGame();
    </script>
</body>
</html>
